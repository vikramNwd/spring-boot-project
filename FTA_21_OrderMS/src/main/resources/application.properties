spring.application.name=FTA-21-OrderMS
spring.datasource.url=jdbc:mysql://localhost:3306/dec_2025_springboot
spring.datasource.username= root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show_sql= true
spring.jpa.properties.hibernate.format_sql=true
server.port= 8082
eureka.client.service-url.defaultZone=http://localhost:8090/eureka/



################# Resilience 4j :: RETRY #########################
resilience4j.retry.instances.rt1.max-attempts=5
resilience4j.retry.instances.rt1.wait-duration=1s


################# Resilience 4j :: CircuitBreaker #########################
resilience4j.circuitbreaker.instances.cb1.sliding-window-size=10
resilience4j.circuitbreaker.instances.cb1.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.cb1.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.cb1.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.cb1.permitted-number-of-calls-in-half-open-state=2

